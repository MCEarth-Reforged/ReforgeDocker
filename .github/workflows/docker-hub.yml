name: Docker Image CI

on:
  push:
    branches: [ "master" ]

    workflow_dispatch:
  

jobs:
  build:
    runs-on: ubuntu-latest
    environment: docker-hub
    steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3.2.0
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - uses: docker/setup-buildx-action@v3.3.0

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:eventbus-latest
        target: reforge-eventbus
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:objectstore-latest
        target: reforge-objectstore
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:apiserver-latest
        target: reforge-apiserver
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:utils-locator-latest
        target: reforge-utils-locator
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:utils-cdn-latest
        target: reforge-utils-cdn
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:buildplate-launcher-latest
        target: reforge-buildplate-launcher
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:tappablesgenerator-latest
        target: reforge-tappablesgenerator
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: docker/build-push-action@v5.3.0
      with:
        tags: thelonedrifter/reforge:utils-tools-buildplate-importer-latest
        target: reforge-utils-tools-buildplate-importer
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
